<!doctype html>
<html lang="ar" dir="rtl">
<head>

  .ex .body { font-family: 'Tajawal'; font-size: 14px; color: #F5E6D3; line-height: 1.6; }
  .dont .tg { color: #E27D60; }
  .do .tg { color: #5BAFA8; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Voice — نموذج الكتابة</div>
  <div class="grid">
    <div class="ex dont"><div class="tg">DON'T</div><div class="body">تعلّم أساسيات البرمجة بالذكاء الاصطناعي في رحلة استثنائية! 🚀🎉</div></div>
    <div class="ex do"><div class="tg">DO</div><div class="body">أربعة أيام. مشروع واحد. تطبيق تبنيه بنفسك.</div></div>
    <div class="ex dont"><div class="tg">DON'T</div><div class="body">نظام متقدّم لإدارة المهام اليومية</div></div>
    <div class="ex do"><div class="tg">DO</div><div class="body">Boss Fight اليوم — كمّل القائمة قبل ما تطلع.</div></div>
  </div>
</div>
</body>
</html>
