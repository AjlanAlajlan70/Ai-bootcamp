<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch.teal   { background: #5BAFA8; color: #1F1410; }
  .swatch.coral  { background: #E27D60; color: #1F1410; }
  .swatch.yellow { background: #E8B14A; color: #1F1410; }
  .swatch.violet { background: #A87B9D; color: #1F1410; }
  .role { font-size: 11px; opacity: 0.85; margin-top: 2px; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Accents — الألوان المميّزة</div>
  <div class="grid">
    <div class="swatch teal"><div class="name">teal</div><div class="hex">#5BAFA8</div><div class="role">أساسي · نجاح</div></div>
    <div class="swatch coral"><div class="name">coral</div><div class="hex">#E27D60</div><div class="role">تحذير · خطر</div></div>
    <div class="swatch yellow"><div class="name">yellow</div><div class="hex">#E8B14A</div><div class="role">اليوم الحالي</div></div>
    <div class="swatch violet"><div class="name">violet</div><div class="hex">#A87B9D</div><div class="role">أوامر · كود</div></div>
  </div>
  <div class="muted" style="font-size:13px">لون واحد فقط لكل كرت — لا تخلطهم على نفس السطح.</div>
</div>
</body>
</html>
