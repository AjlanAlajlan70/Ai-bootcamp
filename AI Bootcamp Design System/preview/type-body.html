<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .item { padding: 6px 0; border-bottom: 1px dashed #3D2B23; }

  .meta { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #C4A88E; margin-bottom: 4px; }
  .body-sample { font-family: 'Tajawal'; color: #F5E6D3; font-size: 16px; line-height: 1.7; }
  .strong-sample { font-family: 'Tajawal'; font-weight: 700; color: #F5E6D3; font-size: 16px; line-height: 1.7; }
  .cap { font-family: 'Tajawal'; font-weight: 500; color: #C4A88E; font-size: 13px; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Body & Caption — Zanjabeel</div>
  <div>
    <div class="item">
      <div class="meta">body — 400 / 16 / 1.7</div>
      <div class="body-sample">أربعة أيام، مشروع واحد، تطبيق تبنيه بنفسك مع Claude Code. ابدأ من اليوم الأول حتى لو ما كتبت سطر كود من قبل.</div>
    </div>
    <div class="item">
      <div class="meta">body-strong — 700 / 16 / 1.7</div>
      <div class="strong-sample">القاعدة الأولى: لا تكتب كود قبل ما تخطّط.</div>
    </div>
    <div class="item">
      <div class="meta">caption — 500 / 13 / 1.4</div>

    </div>
  </div>
</div>

</html>
