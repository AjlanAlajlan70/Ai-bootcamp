<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .g-label { font-family: 'JetBrains Mono'; font-size: 11px; color: #C4A88E; }
  .btn {
    font-family: 'Cairo'; font-weight: 700; font-size: 15px;
    padding: 12px 18px;
    border-radius: 12px;
    border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px; justify-content: center;
    transition: 150ms cubic-bezier(0.2,0.8,0.2,1);
  }
  .btn-primary { background: #5BAFA8; color: #1F1410; }
  .btn-ghost { background: transparent; color: #F5E6D3; border: 1px solid #3D2B23; }
  .btn-danger { background: rgba(226,125,96,0.12); color: #E27D60; border: 1px solid rgba(226,125,96,0.3); }
  .btn-violet { background: rgba(168,123,157,0.14); color: #A87B9D; border: 1px solid rgba(168,123,157,0.3); font-family: 'JetBrains Mono'; font-weight: 500;}
</style>
</head>
<body>
<div class="frame">
  <div class="label">Buttons — الأزرار</div>
  <div class="grid">
    <div class="group"><div class="g-label">primary</div><button class="btn btn-primary">ابدأ من اليوم ١ ←</button></div>
    <div class="group"><div class="g-label">ghost</div><button class="btn btn-ghost">عرض التفاصيل ↓</button></div>
    <div class="group"><div class="g-label">danger / warning</div><button class="btn btn-danger">شغّل /compact</button></div>
    <div class="group"><div class="g-label">code / command</div><button class="btn btn-violet">/plan</button></div>
  </div>
</div>
</body>
</html>
