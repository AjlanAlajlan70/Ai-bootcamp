<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .stage { background: #1F1410; padding: 40px; display: flex; flex-direction: column; gap: 32px; align-items: center; }
  .logo-large { width: 200px; height: 200px; image-rendering: pixelated; image-rendering: crisp-edges; }
  .logo-row { display: flex; gap: 24px; align-items: center; }
  .logo-small { image-rendering: pixelated; image-rendering: crisp-edges; }
  .label { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: 14px; color: #F5E6D3; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="stage">
  <div>
    <img src="../assets/logo.svg" alt="Logo" class="logo-large">
    <div class="label">AI Bootcamp — Mascot Logo</div>
  </div>
  <div class="logo-row">
    <div>
      <img src="../assets/logo.svg" alt="Logo" class="logo-small" style="width: 80px; height: 80px;">
      <div class="label" style="font-size: 10px;">80×80</div>
    </div>
    <div>
      <img src="../assets/logo.svg" alt="Logo" class="logo-small" style="width: 48px; height: 48px;">
      <div class="label" style="font-size: 10px;">48×48</div>
    </div>
    <div>
      <img src="../assets/logo.svg" alt="Logo" class="logo-small" style="width: 32px; height: 32px;">
      <div class="label" style="font-size: 10px;">32×32</div>
    </div>
  </div>
</div>
</body>
</html>
