<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .swatch.bg { background: #1F1410; color: #F5E6D3; }
  .swatch.surface { background: #2B1D18; color: #F5E6D3; }
  .swatch.surface2 { background: #3D2B23; color: #F5E6D3; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Surfaces — لوحة الخلفيات</div>
  <div class="grid">
    <div class="swatch bg"><div class="name">bg</div><div class="hex">#1F1410</div></div>
    <div class="swatch surface"><div class="name">surface</div><div class="hex">#2B1D18</div></div>
    <div class="swatch surface2"><div class="name">surface-2</div><div class="hex">#3D2B23</div></div>
  </div>
  <div class="muted" style="font-size:13px">خلفية التطبيق, الكروت, والكروت المرفوعة.</div>
</div>
</body>
</html>
