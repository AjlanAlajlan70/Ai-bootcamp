<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .stage { position: relative; background: linear-gradient(180deg, #3D2418 0%, #1F1410 100%); border: 1px solid #3D2B23; border-radius: 18px; padding: 18px; min-height: 180px; display: flex; flex-direction: column; justify-content: flex-end; }
  .preview-text { color: #C4A88E; font-family: 'Tajawal'; font-size: 13px; margin-bottom: 12px; }
  .nav {
    background: rgba(31,20,16,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid #3D2B23;
    border-radius: 16px;
    padding: 8px;
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 4px; border-radius: 10px; font-family: 'Tajawal'; font-weight: 500; font-size: 12px; color: #C4A88E; }
  .tab.active { color: #5BAFA8; position: relative; }
  .tab.active::after { content:''; position: absolute; bottom: 0; left: 25%; right: 25%; height: 2px; background: #5BAFA8; border-radius: 2px; }
  .ico { font-family: 'Cairo'; font-weight: 800; font-size: 14px; width: 22px; height: 22px; display:flex; align-items:center; justify-content:center; border: 1.5px solid currentColor; border-radius: 6px; }
  .tab.active .ico { background: rgba(91,175,168,0.12); }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Mobile bottom nav — شريط التبويب</div>
  <div class="stage">
    <div class="preview-text">يطفو فوق المحتوى مع blur. الأيقونة الفعّالة باللون teal مع خطّ سفلي.</div>
    <div class="nav">
      <div class="tab active"><div class="ico">⌂</div>الرئيسية</div>
      <div class="tab"><div class="ico">١</div>الأيام</div>
      <div class="tab"><div class="ico">/</div>الأوامر</div>
      <div class="tab"><div class="ico">P</div>البرومبتات</div>
    </div>
  </div>
</div>
</body>
</html>
