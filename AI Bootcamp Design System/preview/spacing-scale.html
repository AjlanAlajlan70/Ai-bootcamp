<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row3 { display: flex; align-items: flex-end; gap: 14px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .bar { background: #5BAFA8; border-radius: 4px; width: 22px; }
  .step .v { font-family: 'JetBrains Mono'; font-size: 11px; color: #C4A88E; }
  .step .n { font-family: 'Cairo'; font-weight: 700; font-size: 11px; color: #F5E6D3; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Spacing scale — 8pt grid</div>
  <div class="row3">
    <div class="step"><div class="bar" style="height:4px"></div><div class="n">s-1</div><div class="v">4</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="n">s-2</div><div class="v">8</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="n">s-3</div><div class="v">12</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="n">s-4</div><div class="v">16</div></div>
    <div class="step"><div class="bar" style="height:20px"></div><div class="n">s-5</div><div class="v">20</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="n">s-6</div><div class="v">24</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="n">s-7</div><div class="v">32</div></div>
    <div class="step"><div class="bar" style="height:40px"></div><div class="n">s-8</div><div class="v">40</div></div>
    <div class="step"><div class="bar" style="height:56px"></div><div class="n">s-9</div><div class="v">56</div></div>
    <div class="step"><div class="bar" style="height:80px"></div><div class="n">s-10</div><div class="v">80</div></div>
  </div>
  <div class="muted" style="font-size:13px">المسافات بين عناصر الكرت ١٢ بكسل عادةً. حشو الكرت ٢٠.</div>
</div>
</body>
</html>
