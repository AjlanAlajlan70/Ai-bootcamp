<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .wisdom {
    background: linear-gradient(135deg, rgba(232,177,74,0.08) 0%, rgba(168,123,157,0.08) 100%);
    border: 1px solid rgba(232,177,74,0.25);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .wisdom::before {
    content: '';
    position: absolute;
    top: 0; right: 0; left: 0;
    height: 3px;
    background: linear-gradient(90deg, #E8B14A, #5BAFA8, #A87B9D);
  }
  .wisdom img { image-rendering: pixelated; image-rendering: crisp-edges; flex-shrink: 0; }
  .wisdom__kicker {
    font-family: 'Zanjabeel';
    font-weight: 800; font-size: 10px;
    letter-spacing: 0.08em;
    color: #E8B14A;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .wisdom__head {
    font-family: 'Zanjabeel';
    font-weight: 800; font-size: 17px;
    color: #F5E6D3;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .wisdom__sub {
    font-family: 'Zanjabeel';
    font-size: 13.5px;
    color: #C4A88E;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Wisdom callout — حكمة المعسكر</div>
  <div class="wisdom">
    <img src="../assets/mascot-surprised.png" width="64" height="64" alt="" style="image-rendering: pixelated; image-rendering: crisp-edges;">
    <div>
      <div class="wisdom__kicker">حكمة المعسكر</div>
      <div class="wisdom__head">إذا قال Claude «شغّال»...</div>
      <div class="wisdom__sub">جرّبه بنفسك. الفرق بين «المفروض يشتغل» و«فعلًا يشتغل» = ساعة من النوم.</div>
    </div>
  </div>
  <div class="wisdom">
    <img src="../assets/mascot-happy.png" width="64" height="64" alt="" style="image-rendering: pixelated; image-rendering: crisp-edges;">
    <div>
      <div class="wisdom__kicker">حكمة المعسكر</div>
      <div class="wisdom__head">Context ٧٠٪؟ شغّل /compact.</div>
      <div class="wisdom__sub">فكّر بالـ context كـ RAM في الجوّال — لمّا تمتلئ، الذاكرة تهنّق.</div>
    </div>
  </div>
</div>
</body>
</html>
