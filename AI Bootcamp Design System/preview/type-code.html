<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .codeblock {
    background: #3D2B23;
    border: 1px solid #5C4232;
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #F5E6D3;
    direction: ltr;
    text-align: left;
  }
  .codeblock .v { color: #A87B9D; }
  .codeblock .t { color: #5BAFA8; }
  .codeblock .c { color: #C4A88E; }
  .inline {
    background: rgba(168,123,157,0.14);
    color: #A87B9D;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .row2 { display: flex; gap: 10px; align-items: center; font-family: 'Tajawal'; font-size: 14px; }
</style>
</head>
<body>
<div class="frame">
  <div class="label">Code — JetBrains Mono</div>
  <div class="codeblock">
    <span class="v">/plan</span> <span class="c">// خطّط قبل ما تبدأ</span><br>
    <span class="v">/context</span> <span class="c">// شوف الملفات المحمّلة</span><br>
    <span class="v">/compact</span> <span class="c">// قلّص الـ context</span>
  </div>
  <div class="row2">
    <span>استخدم</span> <span class="inline">/plan</span> <span>في بداية كل مهمة.</span>
  </div>
</div>
</body>
</html>
